<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIDLOCK — FPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #canvas { display: block; width: 100vw; height: 100vh; }

    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    /* Crosshair */
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.9);
    }
    #crosshair::before { width: 2px; height: 14px; top: 3px; left: 9px; }
    #crosshair::after  { width: 14px; height: 2px; top: 9px; left: 3px; }
    #crosshair .dot { position: absolute; width: 2px; height: 2px; background: white; top: 9px; left: 9px; }

    /* HUD bottom */
    #hud-bottom {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 20px;
    }

    .weapon-slot {
      background: rgba(0,0,0,0.5);
      border: 1.5px solid rgba(255,255,255,0.15);
      padding: 8px 16px; border-radius: 4px;
      color: rgba(255,255,255,0.4); font-size: 11px;
      text-transform: uppercase; letter-spacing: 2px;
      transition: all 0.1s;
    }
    .weapon-slot.active {
      border-color: rgba(255,255,255,0.9);
      color: white;
      background: rgba(255,255,255,0.1);
    }
    .weapon-slot .key { font-size: 9px; opacity: 0.5; display: block; margin-bottom: 2px; }

    /* Speed indicator */
    #speed-bar {
      position: absolute; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      width: 200px;
    }
    #speed-label { color: rgba(255,255,255,0.4); font-size: 9px; letter-spacing: 3px; text-align: center; margin-bottom: 4px; }
    #speed-track { width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; }
    #speed-fill { height: 100%; width: 0%; background: white; border-radius: 1px; transition: width 0.05s; }

    /* Top left info */
    #top-left {
      position: absolute; top: 20px; left: 20px;
      color: rgba(255,255,255,0.6); font-size: 11px; letter-spacing: 2px;
      line-height: 1.8;
    }
    #top-left .title { font-size: 16px; color: white; letter-spacing: 4px; margin-bottom: 8px; }

    /* Status tags */
    #status-tags {
      display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
    }
    .tag {
      font-size: 9px; padding: 2px 8px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2px; color: rgba(255,255,255,0.4);
      letter-spacing: 2px; transition: all 0.15s;
    }
    .tag.active { border-color: #00ffaa; color: #00ffaa; }

    /* Overlay / lock screen */
    #overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; cursor: pointer;
    }
    #overlay h1 { font-size: 48px; letter-spacing: 12px; margin-bottom: 8px; }
    #overlay p { font-size: 13px; letter-spacing: 4px; color: rgba(255,255,255,0.5); margin-top: 8px; }
    #overlay .controls-grid {
      margin-top: 32px; display: grid;
      grid-template-columns: 1fr 1fr; gap: 6px 32px;
      font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1px;
    }
    #overlay .controls-grid span { color: rgba(255,255,255,0.9); }
    #overlay .click-to-play {
      margin-top: 40px; font-size: 13px; letter-spacing: 6px;
      color: rgba(255,255,255,0.7);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* Knife speed boost flash */
    #knife-boost {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px; letter-spacing: 4px;
      color: #00ffaa; opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      margin-top: 40px;
    }
    #knife-boost.show { opacity: 1; }

    /* Wall jump flash */
    #walljump-flash {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.04);
      pointer-events: none; opacity: 0; z-index: 5;
      transition: opacity 0.1s;
    }
    #walljump-flash.flash { opacity: 1; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="crosshair"><div class="dot"></div></div>

  <div id="top-left">
    <div class="title">GRIDLOCK</div>
    <div style="font-size:10px;opacity:.5;letter-spacing:2px">ARENA v1.0</div>
    <div id="status-tags">
      <div class="tag" id="tag-air">AIR</div>
      <div class="tag" id="tag-wall">WALL</div>
      <div class="tag" id="tag-boost">BOOST</div>
      <div class="tag" id="tag-fast">FAST</div>
    </div>
  </div>

  <div id="speed-bar">
    <div id="speed-label">VELOCITY</div>
    <div id="speed-track"><div id="speed-fill"></div></div>
  </div>

  <div id="hud-bottom">
    <div class="weapon-slot" id="slot-1">
      <span class="key">[1]</span>RIFLE
    </div>
    <div class="weapon-slot" id="slot-2">
      <span class="key">[2]</span>PISTOL
    </div>
    <div class="weapon-slot active" id="slot-3">
      <span class="key">[3]</span>KNIFE
    </div>
  </div>

  <div id="knife-boost">⚡ KNIFE SPEED</div>
</div>

<div id="walljump-flash"></div>

<div id="overlay" id="overlay">
  <h1>GRIDLOCK</h1>
  <p>FAST-PACED ARENA SHOOTER</p>
  <div class="controls-grid">
    <div><span>WASD</span> — Move</div>
    <div><span>SPACE</span> — Jump / Wall Jump</div>
    <div><span>SHIFT</span> — Slide / Dash</div>
    <div><span>1 2 3</span> — Weapons</div>
    <div><span>B</span> — Buy Menu</div>
    <div><span>CTRL</span> — Crouch</div>
    <div><span>MOUSE</span> — Look</div>
    <div><span>CLICK</span> — Shoot</div>
  </div>
  <div class="click-to-play">CLICK TO PLAY</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const GRAVITY        = -28;
const JUMP_FORCE     = 9.5;
const WALK_SPEED     = 10;
const KNIFE_MULT     = 1.55;
const SPRINT_MULT    = 1.35;
const CROUCH_MULT    = 0.45;
const AIR_CONTROL    = 0.35;
const FRICTION       = 12;
const WALL_JUMP_FORCE = 10;
const WALL_JUMP_UP   = 8;
const MAX_WALL_JUMPS = 2;
const SLIDE_FORCE    = 18;
const SLIDE_DUR      = 0.38;

// ─── SCENE SETUP ──────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.setClearColor(0x1a1a1e);

const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x1a1a1e, 0.025);

const camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.05, 300);
camera.position.set(0, 1.7, 0);

// ─── LIGHTING ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(20, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = sun.shadow.camera.bottom = -80;
sun.shadow.camera.right = sun.shadow.camera.top = 80;
scene.add(sun);

// Grid accent lights
const accentColors = [0x8888ff, 0xaaffee, 0xffffff];
accentColors.forEach((c, i) => {
  const pl = new THREE.PointLight(c, 0.6, 40);
  pl.position.set(Math.cos(i * 2.1) * 20, 6, Math.sin(i * 2.1) * 20);
  scene.add(pl);
});

// ─── RIVALS-STYLE ARENA MAP ───────────────────────────────────────────────────
function buildArena() {
  // --- Floor: bright grid ---
  const floorGeo = new THREE.PlaneGeometry(120, 120, 60, 60);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0xd0d0d8,
    roughness: 0.85,
    metalness: 0.05,
    wireframe: false,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid lines overlay
  const gridHelper = new THREE.GridHelper(120, 60, 0x8090b0, 0x8090b0);
  gridHelper.position.y = 0.01;
  gridHelper.material.opacity = 0.35;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);

  // Sub-grid (finer)
  const subGrid = new THREE.GridHelper(120, 240, 0x6070a0, 0x6070a0);
  subGrid.position.y = 0.015;
  subGrid.material.opacity = 0.12;
  subGrid.material.transparent = true;
  scene.add(subGrid);

  // Ceiling
  const ceilGeo = new THREE.PlaneGeometry(120, 120);
  const ceilMat = new THREE.MeshStandardMaterial({ color: 0x18181c, roughness: 1 });
  const ceil = new THREE.Mesh(ceilGeo, ceilMat);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = 20;
  scene.add(ceil);

  // Arena walls (4 outer walls)
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xc8c8d0, roughness: 0.9, metalness: 0.1 });
  const wallConfigs = [
    { w:120, h:20, d:1, x:0,    y:10, z:-60  },
    { w:120, h:20, d:1, x:0,    y:10, z:60   },
    { w:1,   h:20, d:120, x:-60, y:10, z:0  },
    { w:1,   h:20, d:120, x:60,  y:10, z:0  },
  ];
  wallConfigs.forEach(c => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(c.w, c.h, c.d), wallMat);
    m.position.set(c.x, c.y, c.z);
    m.castShadow = m.receiveShadow = true;
    scene.add(m);
    collidables.push(m);
  });

  // Interior platforms / cover boxes (Rivals-style)
  const blockMat = new THREE.MeshStandardMaterial({ color: 0xbabac8, roughness: 0.8, metalness: 0.15 });
  const glowMat  = new THREE.MeshStandardMaterial({ color: 0x6688ff, roughness: 0.3, metalness: 0.8, emissive: 0x2233aa, emissiveIntensity: 0.4 });

  const blocks = [
    // center island
    { w:6, h:1.2, d:6,  x:0,   y:.6,   z:0   },
    { w:3, h:3,   d:3,  x:0,   y:1.5,  z:0   },
    // left cluster
    { w:4, h:2,   d:2,  x:-18, y:1,    z:-5  },
    { w:2, h:4,   d:2,  x:-22, y:2,    z:2   },
    { w:8, h:1,   d:2,  x:-14, y:.5,   z:10  },
    // right cluster
    { w:4, h:2,   d:2,  x:18,  y:1,    z:5   },
    { w:2, h:4,   d:2,  x:22,  y:2,    z:-2  },
    { w:8, h:1,   d:2,  x:14,  y:.5,   z:-10 },
    // far platforms
    { w:10, h:.8, d:4,  x:0,   y:.4,   z:28  },
    { w:10, h:.8, d:4,  x:0,   y:.4,   z:-28 },
    // elevated walkways
    { w:20, h:.5, d:2,  x:0,   y:5,    z:12  },
    { w:20, h:.5, d:2,  x:0,   y:5,    z:-12 },
    { w:2,  h:.5, d:20, x:12,  y:5,    z:0   },
    { w:2,  h:.5, d:20, x:-12, y:5,    z:0   },
    // pillars
    { w:1.5,h:10, d:1.5,x:-8,  y:5,    z:-8  },
    { w:1.5,h:10, d:1.5,x:8,   y:5,    z:-8  },
    { w:1.5,h:10, d:1.5,x:-8,  y:5,    z:8   },
    { w:1.5,h:10, d:1.5,x:8,   y:5,    z:8   },
    // corner ramps (flat boxes simulating ramps)
    { w:6, h:.4, d:6,   x:-30, y:.2,   z:-30 },
    { w:6, h:.4, d:6,   x:30,  y:.2,   z:-30 },
    { w:6, h:.4, d:6,   x:-30, y:.2,   z:30  },
    { w:6, h:.4, d:6,   x:30,  y:.2,   z:30  },
  ];

  blocks.forEach((b, i) => {
    const mat = i < 3 ? glowMat : blockMat;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), mat);
    mesh.position.set(b.x, b.y, b.z);
    mesh.castShadow = mesh.receiveShadow = true;
    scene.add(mesh);
    collidables.push(mesh);
  });

  // Decorative glowing edge lines on platforms
  for (let i = 0; i < 8; i++) {
    const lg = new THREE.BoxGeometry(0.08, 0.08, 20);
    const lm = new THREE.MeshStandardMaterial({
      color: 0x88aaff, emissive: 0x4466ee, emissiveIntensity: 1.5,
      roughness: 0.1, metalness: 1
    });
    const lmesh = new THREE.Mesh(lg, lm);
    const angle = (i / 8) * Math.PI * 2;
    lmesh.position.set(Math.cos(angle) * 24, 0.05, Math.sin(angle) * 24);
    lmesh.rotation.y = angle;
    scene.add(lmesh);
  }
}

// ─── WEAPON MODELS ────────────────────────────────────────────────────────────
const weaponGroup = new THREE.Group();
camera.add(weaponGroup);
scene.add(camera);

// Knife model
function makeKnife() {
  const g = new THREE.Group();
  // handle
  const handleGeo = new THREE.BoxGeometry(0.04, 0.04, 0.18);
  const handleMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.9 });
  const handle = new THREE.Mesh(handleGeo, handleMat);
  handle.castShadow = true;
  g.add(handle);

  // guard
  const guardGeo = new THREE.BoxGeometry(0.09, 0.018, 0.018);
  const guardMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
  const guard = new THREE.Mesh(guardGeo, guardMat);
  guard.position.z = 0.09;
  g.add(guard);

  // blade
  const bladePts = [
    new THREE.Vector2(0,0), new THREE.Vector2(0.012, 0),
    new THREE.Vector2(0.008, 0.22), new THREE.Vector2(0, 0.24),
  ];
  const bladeShape = new THREE.Shape(bladePts);
  const bladeGeo = new THREE.ExtrudeGeometry(bladeShape, { depth: 0.003, bevelEnabled: false });
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.95, roughness: 0.1 });
  const blade = new THREE.Mesh(bladeGeo, bladeMat);
  blade.position.set(-0.006, -0.012, 0.1);
  blade.castShadow = true;
  g.add(blade);

  // blade edge shine
  const shineGeo = new THREE.BoxGeometry(0.001, 0.22, 0.001);
  const shineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 });
  const shine = new THREE.Mesh(shineGeo, shineMat);
  shine.position.set(0.013, 0.1, 0.1);
  g.add(shine);

  return g;
}

// Pistol model
function makePistol() {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.7, roughness: 0.4 });
  const silverMat = new THREE.MeshStandardMaterial({ color: 0x888, metalness: 0.9, roughness: 0.2 });
  // body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.18), mat);
  g.add(body);
  // barrel
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.22, 8), silverMat);
  barrel.rotation.x = Math.PI/2;
  barrel.position.set(0, 0.024, 0.2);
  g.add(barrel);
  // grip
  const grip = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.12, 0.06), mat);
  grip.position.set(0, -0.09, -0.04);
  grip.rotation.x = 0.2;
  g.add(grip);
  // trigger guard
  const tg = new THREE.Mesh(new THREE.TorusGeometry(0.022, 0.005, 6, 12, Math.PI), mat);
  tg.position.set(0, -0.03, 0.04);
  tg.rotation.x = Math.PI/2;
  g.add(tg);
  return g;
}

// Rifle model
function makeRifle() {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6, roughness: 0.5 });
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x3a200a, roughness: 0.9 });
  // body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.065, 0.5), mat);
  g.add(body);
  // barrel
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.35, 8), mat);
  barrel.rotation.x = Math.PI/2;
  barrel.position.set(0, 0.01, 0.42);
  g.add(barrel);
  // stock
  const stock = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.07, 0.2), woodMat);
  stock.position.set(0, -0.01, -0.32);
  g.add(stock);
  // grip
  const grip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, 0.05), mat);
  grip.position.set(0, -0.075, -0.08);
  grip.rotation.x = 0.25;
  g.add(grip);
  // mag
  const mag = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, 0.04), mat);
  mag.position.set(0, -0.07, 0.05);
  g.add(mag);
  // rail
  const rail = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.01, 0.3), mat);
  rail.position.set(0, 0.038, 0.2);
  g.add(rail);
  return g;
}

const weapons = {
  rifle:  makeRifle(),
  pistol: makePistol(),
  knife:  makeKnife(),
};

// Position offsets for each weapon (view model position)
const weaponOffsets = {
  rifle:  { pos: new THREE.Vector3(0.22, -0.22, -0.45), rot: new THREE.Euler(0, 0, 0) },
  pistol: { pos: new THREE.Vector3(0.18, -0.20, -0.35), rot: new THREE.Euler(0, 0, 0) },
  knife:  { pos: new THREE.Vector3(0.14, -0.18, -0.3),  rot: new THREE.Euler(-0.3, 2.8, 0.3) },
};

Object.values(weapons).forEach(w => {
  w.visible = false;
  weaponGroup.add(w);
});

// ─── PLAYER STATE ─────────────────────────────────────────────────────────────
const collidables = [];
const PLAYER_HEIGHT = 1.75;
const PLAYER_RADIUS = 0.32;
const STEP_HEIGHT   = 0.35;

const player = {
  pos:        new THREE.Vector3(0, PLAYER_HEIGHT, 5),
  vel:        new THREE.Vector3(),
  yaw:        0,
  pitch:      0,
  onGround:   false,
  touchingWall: false,
  wallNormal: new THREE.Vector3(),
  wallJumps:  0,
  sliding:    false,
  slideTimer: 0,
  crouching:  false,
  weapon:     'knife',   // rifle | pistol | knife
  weaponPrev: 'knife',
  swapAnim:   0,
};

const keys = {};
let mouseDX = 0, mouseDY = 0;
let locked = false;

// ─── WEAPON SWITCHING ─────────────────────────────────────────────────────────
const slotEls = {
  '1': document.getElementById('slot-1'),
  '2': document.getElementById('slot-2'),
  '3': document.getElementById('slot-3'),
};
const weaponNames = { '1': 'rifle', '2': 'pistol', '3': 'knife' };

function setWeapon(name) {
  if (player.weapon === name) return;
  player.weaponPrev = player.weapon;
  player.weapon = name;
  player.swapAnim = 1;

  Object.values(slotEls).forEach(el => el.classList.remove('active'));
  const keyForName = Object.entries(weaponNames).find(([,v]) => v === name)?.[0];
  if (keyForName) slotEls[keyForName].classList.add('active');

  // Knife boost indicator
  const boost = document.getElementById('knife-boost');
  if (name === 'knife') {
    boost.classList.add('show');
    document.getElementById('tag-fast').classList.add('active');
  } else {
    boost.classList.remove('show');
    document.getElementById('tag-fast').classList.remove('active');
  }
}

setWeapon('knife');

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  // Weapon slots
  if (e.code === 'Digit1') setWeapon('rifle');
  if (e.code === 'Digit2') setWeapon('pistol');
  if (e.code === 'Digit3') setWeapon('knife');
  // B = buy (placeholder)
  if (e.code === 'KeyB' && locked) {
    // future: open buy menu
  }
  // Q = quick swap (last weapon)
  if (e.code === 'KeyQ') setWeapon(player.weaponPrev);
  // Prevent scroll
  if (['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',   e => { keys[e.code] = false; });
document.addEventListener('mousemove', e => {
  if (!locked) return;
  mouseDX += e.movementX;
  mouseDY += e.movementY;
});
document.addEventListener('mousedown', e => {
  if (!locked) return;
  if (e.button === 0) { /* shoot - future */ }
});

// Pointer lock
const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => {
  canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === canvas;
  overlay.style.display = locked ? 'none' : 'flex';
});

// ─── COLLISION HELPERS ────────────────────────────────────────────────────────
const _box   = new THREE.Box3();
const _boxP  = new THREE.Box3();
const _vec   = new THREE.Vector3();

function playerBox(pos) {
  return new THREE.Box3(
    new THREE.Vector3(pos.x - PLAYER_RADIUS, pos.y - PLAYER_HEIGHT, pos.z - PLAYER_RADIUS),
    new THREE.Vector3(pos.x + PLAYER_RADIUS, pos.y + 0.1,           pos.z + PLAYER_RADIUS)
  );
}

function resolveCollision(pos, vel) {
  let grounded = false;
  let wallTouch = false;
  let wallNormal = new THREE.Vector3();

  for (const obj of collidables) {
    _box.setFromObject(obj);

    const pb = playerBox(pos);
    if (!pb.intersectsBox(_box)) continue;

    // Overlap amounts on each axis
    const ox = Math.min(pb.max.x, _box.max.x) - Math.max(pb.min.x, _box.min.x);
    const oy = Math.min(pb.max.y, _box.max.y) - Math.max(pb.min.y, _box.min.y);
    const oz = Math.min(pb.max.z, _box.max.z) - Math.max(pb.min.z, _box.min.z);

    // Push out on smallest overlap axis
    if (oy < ox && oy < oz) {
      // vertical
      const pcY = (pb.min.y + pb.max.y) / 2;
      const ocY = (_box.min.y + _box.max.y) / 2;
      if (pcY < ocY) {
        // player below box — ceiling hit
        pos.y -= oy;
        if (vel.y > 0) vel.y = 0;
      } else {
        // player above box — floor
        pos.y += oy;
        if (vel.y < 0) { vel.y = 0; grounded = true; }
      }
    } else if (ox < oz) {
      // x push
      const pcX = (pb.min.x + pb.max.x) / 2;
      const ocX = (_box.min.x + _box.max.x) / 2;
      const sign = pcX < ocX ? -1 : 1;
      pos.x += sign * ox;
      const wn = new THREE.Vector3(sign, 0, 0);
      if (!grounded) { wallTouch = true; wallNormal.add(wn); }
      if (Math.abs(vel.x) > 0) vel.x *= 0.3;
    } else {
      // z push
      const pcZ = (pb.min.z + pb.max.z) / 2;
      const ocZ = (_box.min.z + _box.max.z) / 2;
      const sign = pcZ < ocZ ? -1 : 1;
      pos.z += sign * oz;
      const wn = new THREE.Vector3(0, 0, sign);
      if (!grounded) { wallTouch = true; wallNormal.add(wn); }
      if (Math.abs(vel.z) > 0) vel.z *= 0.3;
    }
  }

  if (wallNormal.lengthSq() > 0) wallNormal.normalize();
  return { grounded, wallTouch, wallNormal };
}

// ─── WEAPON BOBBING & SWAP ANIM ───────────────────────────────────────────────
let bobTime = 0;
let lastWeapon = player.weapon;

function updateWeaponVisual(dt, speed) {
  // Show correct weapon
  const wep = weapons[player.weapon];
  Object.entries(weapons).forEach(([name, w]) => {
    if (name !== player.weapon) w.visible = false;
  });
  wep.visible = true;

  const off = weaponOffsets[player.weapon];

  // Bob
  const isMoving = speed > 1.5;
  if (isMoving) bobTime += dt * 10;
  const bobX = isMoving ? Math.sin(bobTime) * 0.018 : 0;
  const bobY = isMoving ? Math.abs(Math.sin(bobTime)) * 0.012 : 0;

  // Swap animation
  let swapY = 0;
  if (player.swapAnim > 0) {
    player.swapAnim = Math.max(0, player.swapAnim - dt * 8);
    swapY = Math.sin(player.swapAnim * Math.PI) * 0.15;
  }

  // Knife idle float
  let idleY = 0;
  if (player.weapon === 'knife') {
    idleY = Math.sin(Date.now() * 0.001) * 0.005;
  }

  wep.position.set(
    off.pos.x + bobX,
    off.pos.y + bobY - swapY + idleY,
    off.pos.z
  );
  wep.rotation.set(off.rot.x, off.rot.y, off.rot.z);

  // Slight tilt on strafing
  if (keys['KeyA']) wep.rotation.z = THREE.MathUtils.lerp(wep.rotation.z, 0.1, 0.15);
  else if (keys['KeyD']) wep.rotation.z = THREE.MathUtils.lerp(wep.rotation.z, -0.1, 0.15);
  else wep.rotation.z = THREE.MathUtils.lerp(wep.rotation.z, off.rot.z, 0.15);
}

// ─── WALL JUMP FLASH ──────────────────────────────────────────────────────────
const wallFlash = document.getElementById('walljump-flash');
function doWallJumpFlash() {
  wallFlash.classList.add('flash');
  setTimeout(() => wallFlash.classList.remove('flash'), 80);
}

// ─── MAIN UPDATE ──────────────────────────────────────────────────────────────
let prevTime = performance.now();
let jumpPressedPrev = false;
let slideCooldown = 0;

function update() {
  requestAnimationFrame(update);

  const now = performance.now();
  const dt  = Math.min((now - prevTime) / 1000, 0.05);
  prevTime  = now;

  if (!locked) { renderer.render(scene, camera); return; }

  // ── Mouse look ──
  const SENS = 0.0015;
  player.yaw   -= mouseDX * SENS;
  player.pitch -= mouseDY * SENS;
  player.pitch  = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, player.pitch));
  mouseDX = mouseDY = 0;

  // ── Speed modifiers ──
  const isKnife   = player.weapon === 'knife';
  const isSprint  = keys['ShiftLeft'] || keys['ShiftRight'];
  const isCrouch  = keys['ControlLeft'] || keys['ControlRight'];
  player.crouching = isCrouch;

  let speedMult = 1;
  if (isKnife)  speedMult *= KNIFE_MULT;
  if (isSprint) speedMult *= SPRINT_MULT;
  if (isCrouch) speedMult *= CROUCH_MULT;
  if (player.sliding) speedMult = 1.6;

  const moveSpeed = WALK_SPEED * speedMult;

  // ── Movement direction (relative to yaw) ──
  const fwd  = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const rght = new THREE.Vector3( Math.cos(player.yaw), 0, -Math.sin(player.yaw));

  let wishDir = new THREE.Vector3();
  if (keys['KeyW']) wishDir.addScaledVector(fwd,  1);
  if (keys['KeyS']) wishDir.addScaledVector(fwd, -1);
  if (keys['KeyA']) wishDir.addScaledVector(rght,-1);
  if (keys['KeyD']) wishDir.addScaledVector(rght, 1);
  if (wishDir.lengthSq() > 0) wishDir.normalize();

  // ── Slide ──
  slideCooldown = Math.max(0, slideCooldown - dt);
  if (isSprint && isCrouch && player.onGround && !player.sliding && slideCooldown === 0) {
    player.sliding   = true;
    player.slideTimer = SLIDE_DUR;
    // Boost in look direction
    player.vel.addScaledVector(fwd, SLIDE_FORCE * 0.5);
    slideCooldown = 0.6;
  }
  if (player.sliding) {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0 || !isCrouch) {
      player.sliding = false;
    }
  }

  // ── Apply horizontal movement ──
  const accel = player.onGround ? FRICTION : AIR_CONTROL * FRICTION;
  if (player.onGround || wishDir.lengthSq() > 0) {
    const targetVelX = wishDir.x * moveSpeed;
    const targetVelZ = wishDir.z * moveSpeed;
    player.vel.x += (targetVelX - player.vel.x) * Math.min(1, accel * dt);
    player.vel.z += (targetVelZ - player.vel.z) * Math.min(1, accel * dt);
  }

  // Friction when no input on ground
  if (player.onGround && wishDir.lengthSq() === 0 && !player.sliding) {
    const fric = Math.max(0, 1 - FRICTION * dt);
    player.vel.x *= fric;
    player.vel.z *= fric;
  }

  // ── Jump / Wall jump ──
  const jumpPress = !!(keys['Space']);
  if (jumpPress && !jumpPressedPrev) {
    if (player.onGround) {
      player.vel.y = JUMP_FORCE;
      player.onGround = false;
      player.wallJumps = 0;
    } else if (player.touchingWall && player.wallJumps < MAX_WALL_JUMPS) {
      // Wall jump: push away from wall + upward
      player.vel.y = WALL_JUMP_UP;
      player.vel.addScaledVector(player.wallNormal, WALL_JUMP_FORCE);
      player.wallJumps++;
      doWallJumpFlash();
      document.getElementById('tag-wall').classList.add('active');
      setTimeout(() => document.getElementById('tag-wall').classList.remove('active'), 300);
    }
  }
  jumpPressedPrev = jumpPress;

  // ── Gravity ──
  player.vel.y += GRAVITY * dt;

  // ── Integrate position ──
  const newPos = player.pos.clone().addScaledVector(player.vel, dt);

  // ── Floor clamp ──
  if (newPos.y - PLAYER_HEIGHT < 0) {
    newPos.y = PLAYER_HEIGHT;
    if (player.vel.y < 0) { player.vel.y = 0; player.onGround = true; }
  }

  // ── Collision ──
  const col = resolveCollision(newPos, player.vel);
  if (col.grounded) { player.onGround = true; player.wallJumps = 0; }
  else if (!col.grounded && newPos.y - PLAYER_HEIGHT > 0.05) player.onGround = false;

  player.touchingWall = col.wallTouch && !player.onGround;
  player.wallNormal.copy(col.wallNormal);

  player.pos.copy(newPos);

  // ── Camera ──
  const camHeight = player.crouching ? 1.1 : (player.sliding ? 0.9 : PLAYER_HEIGHT);
  camera.position.lerp(
    new THREE.Vector3(player.pos.x, player.pos.y - PLAYER_HEIGHT + camHeight, player.pos.z),
    0.25
  );
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  // Camera roll on strafe (Rivals feel)
  const strafeRoll = (keys['KeyA'] ? 1 : 0) - (keys['KeyD'] ? 1 : 0);
  camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, strafeRoll * 0.025, 0.12);

  // ── HUD ──
  const horizSpeed = Math.sqrt(player.vel.x ** 2 + player.vel.z ** 2);
  const maxSpd = WALK_SPEED * KNIFE_MULT * SPRINT_MULT * 1.5;
  document.getElementById('speed-fill').style.width = Math.min(100, (horizSpeed / maxSpd) * 100) + '%';

  document.getElementById('tag-air').classList.toggle('active', !player.onGround);
  document.getElementById('tag-boost').classList.toggle('active', player.sliding);

  updateWeaponVisual(dt, horizSpeed);

  renderer.render(scene, camera);
}

// ─── BUILD MAP & START ─────────────────────────────────────────────────────────
buildArena();
update();

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
