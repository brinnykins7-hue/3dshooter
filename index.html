<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARENA FPS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ccc; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  /* HUD */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  /* Crosshair */
  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
  }
  .ch-h, .ch-v {
    position: absolute; background: rgba(255,255,255,0.9);
    border-radius: 1px;
  }
  .ch-h { width: 8px; height: 2px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .ch-v { width: 2px; height: 8px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .ch-dot { position: absolute; width: 2px; height: 2px; background: #fff; top: 50%; left: 50%; transform: translate(-50%,-50%); border-radius: 50%; }

  /* Ammo */
  #ammo {
    position: absolute; bottom: 40px; right: 40px;
    color: #111; text-align: right;
  }
  #ammo-current { font-size: 48px; font-weight: bold; letter-spacing: -2px; }
  #ammo-reserve { font-size: 20px; color: rgba(0,0,0,0.5); margin-top: -4px; }

  /* Weapon name */
  #weapon-name {
    position: absolute; bottom: 100px; right: 40px;
    color: rgba(0,0,0,0.7); font-size: 14px; letter-spacing: 3px; text-transform: uppercase;
  }

  /* Speed indicator */
  #speed-bar {
    position: absolute; bottom: 40px; left: 40px;
  }
  #speed-label { color: rgba(0,0,0,0.5); font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }
  #speed-fill-outer { width: 120px; height: 3px; background: rgba(0,0,0,0.15); border-radius: 2px; }
  #speed-fill { height: 3px; background: linear-gradient(90deg, #0088cc, #0044ff); border-radius: 2px; width: 0%; transition: width 0.1s; }

  /* Hit marker */
  #hitmarker {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%) rotate(45deg);
    width: 16px; height: 16px; opacity: 0; pointer-events: none;
    transition: opacity 0.05s;
  }
  #hitmarker.flash { opacity: 1; }
  #hitmarker::before, #hitmarker::after {
    content: ''; position: absolute; background: #ff4444;
  }
  #hitmarker::before { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
  #hitmarker::after { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }

  /* Muzzle flash */
  #muzzle-flash {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 60px; height: 60px;
    background: radial-gradient(circle, rgba(255,200,50,0.8) 0%, transparent 70%);
    opacity: 0; pointer-events: none; border-radius: 50%;
    transition: opacity 0.04s;
  }
  #muzzle-flash.flash { opacity: 1; }

  /* Kill feed */
  #killfeed {
    position: absolute; top: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }
  .kf-entry {
    background: rgba(0,0,0,0.4); border-left: 2px solid #ff3333;
    padding: 4px 10px; font-size: 12px; color: #fff; letter-spacing: 1px;
    animation: kfFade 3s forwards;
  }
  @keyframes kfFade { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

  /* Weapon buy menu */
  #buy-menu {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
    z-index: 100; pointer-events: all;
    flex-direction: column; align-items: center; justify-content: center;
  }
  #buy-menu.open { display: flex; }
  #buy-title {
    font-size: 11px; letter-spacing: 6px; color: rgba(0,0,0,0.5);
    text-transform: uppercase; margin-bottom: 40px;
  }
  #buy-categories {
    display: flex; gap: 4px; margin-bottom: 30px;
  }
  .buy-cat {
    padding: 6px 18px; background: transparent; border: 1px solid rgba(0,0,0,0.2);
    color: rgba(0,0,0,0.5); font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .buy-cat.active, .buy-cat:hover { background: rgba(0,0,0,0.08); color: #000; border-color: rgba(0,0,0,0.4); }
  #buy-grid {
    display: grid; grid-template-columns: repeat(4, 220px); gap: 3px;
    max-height: 60vh; overflow-y: auto;
  }
  .buy-item {
    background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.1);
    padding: 16px 20px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .buy-item:hover, .buy-item.selected {
    background: rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.3);
  }
  .buy-item.selected { border-color: #0066cc; background: rgba(0,100,200,0.08); }
  .buy-item-name { font-size: 13px; color: #111; letter-spacing: 1px; }
  .buy-item-stats { display: flex; gap: 12px; }
  .buy-stat { font-size: 10px; color: rgba(0,0,0,0.4); letter-spacing: 1px; }
  .buy-stat span { color: rgba(0,0,0,0.8); }
  #buy-footer {
    margin-top: 24px; color: rgba(0,0,0,0.4); font-size: 11px; letter-spacing: 2px;
  }

  /* Scope overlay */
  #scope-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 8;
    opacity: 0; transition: opacity 0.1s;
  }
  #scope-overlay.active { opacity: 1; }
  #scope-overlay canvas { width: 100%; height: 100%; }

  /* Lock screen */
  #lock-screen {
    position: fixed; inset: 0; background: #e8e8e8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; cursor: pointer;
  }
  #lock-title { font-size: 56px; letter-spacing: 12px; color: #111; font-weight: 900; margin-bottom: 8px; }
  #lock-sub { font-size: 11px; letter-spacing: 6px; color: rgba(0,0,0,0.4); margin-bottom: 60px; }
  #lock-cta {
    font-size: 11px; letter-spacing: 4px; color: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,0,0,0.3); padding: 14px 40px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  #controls-hint {
    position: absolute; bottom: 40px;
    display: grid; grid-template-columns: repeat(3,1fr); gap: 20px 40px;
    font-size: 10px; color: rgba(0,0,0,0.3); letter-spacing: 2px;
  }
  .hint-key { color: rgba(0,0,0,0.6); }

  /* Kill notification */
  #kill-notif {
    position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
    color: #cc2200; font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.1s; white-space: nowrap;
  }
  #kill-notif.show { opacity: 1; }
</style>
</head>
<body>

<div id="lock-screen">
  <div id="lock-title">ARENA</div>
  <div id="lock-sub">FIRST PERSON SHOOTER</div>
  <div id="lock-cta">CLICK TO PLAY</div>
  <div id="controls-hint">
    <div><span class="hint-key">WASD</span> — MOVE</div>
    <div><span class="hint-key">SPACE</span> — JUMP</div>
    <div><span class="hint-key">SHIFT</span> — SPRINT</div>
    <div><span class="hint-key">CTRL</span> — CROUCH</div>
    <div><span class="hint-key">B</span> — WEAPON MENU</div>
    <div><span class="hint-key">1</span> — PRIMARY</div>
    <div><span class="hint-key">2</span> — SECONDARY</div>
    <div><span class="hint-key">3</span> — KNIFE</div>
    <div><span class="hint-key">R</span> — RELOAD</div>
    <div><span class="hint-key">LMB</span> — SHOOT</div>
    <div><span class="hint-key">RMB</span> — ADS</div>
    <div><span class="hint-key">ESC</span> — UNLOCK MOUSE</div>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="crosshair">
    <div class="ch-h"></div>
    <div class="ch-v"></div>
    <div class="ch-dot"></div>
  </div>
  <div id="hitmarker"></div>
  <div id="muzzle-flash"></div>
  <div id="ammo">
    <div id="ammo-current">30</div>
    <div id="ammo-reserve">/ 90</div>
  </div>
  <div id="weapon-name">AK-47</div>
  <div id="speed-bar">
    <div id="speed-label">VELOCITY</div>
    <div id="speed-fill-outer"><div id="speed-fill"></div></div>
  </div>
  <div id="kill-notif">ELIMINATED</div>
  <div id="killfeed"></div>
</div>

<!-- Scope overlay -->
<div id="scope-overlay">
  <canvas id="scope-canvas"></canvas>
</div>

<!-- Weapon Menu -->
<div id="buy-menu">
  <div id="buy-title">WEAPON SELECTION</div>
  <div id="buy-categories">
    <button class="buy-cat active" data-cat="rifle">RIFLES</button>
    <button class="buy-cat" data-cat="smg">SMGs</button>
    <button class="buy-cat" data-cat="shotgun">SHOTGUNS</button>
    <button class="buy-cat" data-cat="sniper">SNIPERS</button>
    <button class="buy-cat" data-cat="pistol">PISTOLS</button>
    <button class="buy-cat" data-cat="melee">MELEE</button>
  </div>
  <div id="buy-grid"></div>
  <div id="buy-footer">[ B ] CLOSE &nbsp;•&nbsp; CLICK TO SELECT</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== WEAPON DATABASE =====
const WEAPONS = {
  // RIFLES
  ak47:   { name:'AK-47',       cat:'rifle',   damage:35, rpm:600,  mag:30, reserve:90,  reload:2.4, spread:1.0,  recoil:0.09,  auto:true,  speedMult:0.85, range:80, pellets:1 },
  m4a1:   { name:'M4A1',        cat:'rifle',   damage:26, rpm:666,  mag:30, reserve:90,  reload:2.4, spread:0.7,  recoil:0.06,  auto:true,  speedMult:0.85, range:80, pellets:1 },
  // SMGs
  mp5sd:  { name:'MP5-SD',      cat:'smg',     damage:18, rpm:857,  mag:30, reserve:120, reload:2.1, spread:0.9,  recoil:0.04,  auto:true,  speedMult:0.95, range:50, pellets:1 },
  p90:    { name:'P90',         cat:'smg',     damage:20, rpm:857,  mag:50, reserve:100, reload:3.3, spread:1.0,  recoil:0.045, auto:true,  speedMult:0.92, range:55, pellets:1 },
  // SHOTGUNS
  nova:   { name:'Nova',        cat:'shotgun', damage:20, rpm:68,   mag:8,  reserve:32,  reload:0.5, spread:2.5,  recoil:0.25,  auto:false, speedMult:0.88, range:25, pellets:9 },
  xm1014: { name:'XM1014',      cat:'shotgun', damage:18, rpm:150,  mag:7,  reserve:28,  reload:0.4, spread:3.0,  recoil:0.20,  auto:true,  speedMult:0.86, range:22, pellets:8 },
  // SNIPERS
  awp:    { name:'AWP',         cat:'sniper',  damage:115,rpm:41,   mag:10, reserve:30,  reload:3.7, spread:0.1,  recoil:0.35,  auto:false, speedMult:0.70, range:200,pellets:1 },
  // PISTOLS
  glock:  { name:'Glock-18',    cat:'pistol',  damage:16, rpm:400,  mag:20, reserve:120, reload:2.2, spread:1.0,  recoil:0.03,  auto:false, speedMult:1.0,  range:40, pellets:1 },
  deagle: { name:'Desert Eagle',cat:'pistol',  damage:55, rpm:267,  mag:7,  reserve:35,  reload:2.2, spread:1.2,  recoil:0.15,  auto:false, speedMult:0.97, range:70, pellets:1 },
  // MELEE
  knife:  { name:'Knife',       cat:'melee',   damage:85, rpm:80,   mag:1,  reserve:1,   reload:0,   spread:0,    recoil:0,     auto:false, speedMult:1.15, range:3,  pellets:1 }
};

// ===== THREE.JS SETUP =====
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd0d8e0);
scene.fog = new THREE.Fog(0xd0d8e0, 100, 220);

const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.05, 300);

// ===== LIGHTING - bright and clear =====
const ambient = new THREE.AmbientLight(0xffffff, 1.8);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
sunLight.position.set(30, 60, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 250;
sunLight.shadow.camera.left  = -80;
sunLight.shadow.camera.right = 80;
sunLight.shadow.camera.top   = 80;
sunLight.shadow.camera.bottom = -80;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0xddeeff, 0.8);
fillLight.position.set(-20, 20, -30);
scene.add(fillLight);

// ===== PLAYER STATE =====
const collidables = [];
const bulletDecals = []; // persistent bullet marks

const player = {
  pos: new THREE.Vector3(0, 1.8, 0),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  onGround: false,
  crouching: false,
  height: 1.8,
  crouchHeight: 1.0,
  primaryWeapon: WEAPONS.ak47,
  secondaryWeapon: WEAPONS.glock,
  meleeWeapon: WEAPONS.knife,
  currentSlot: 'primary',
  currentWeapon: null,
  ammo: {},
  reloading: false,
  reloadTimer: 0,
  lastShot: 0,
  ads: false,
  dead: false
};

Object.keys(WEAPONS).forEach(k => {
  player.ammo[k] = { mag: WEAPONS[k].mag, reserve: WEAPONS[k].reserve };
});
player.currentWeapon = player.primaryWeapon;

// ===== CAMERA RIG =====
const cameraHolder = new THREE.Object3D();
scene.add(cameraHolder);
cameraHolder.add(camera);
camera.position.set(0, 0, 0);

const weaponGroup = new THREE.Group();
camera.add(weaponGroup);
weaponGroup.position.set(0.3, -0.3, -0.5);

// ===== ARENA MAP =====
function buildArena() {
  const GRID = 120;
  const CELL = 4;

  // Floor - light gray
  const floorGeo = new THREE.PlaneGeometry(GRID, GRID);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9, metalness: 0.0 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid lines (subtle)
  const gridHelper = new THREE.GridHelper(GRID, GRID / CELL, 0xaaaaaa, 0xbbbbbb);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Outer walls - light gray
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xbbbbc4, roughness: 0.8, metalness: 0.05 });
  const wallConfigs = [
    { w: GRID, h: 14, d: 1,  x: 0,       y: 7, z: -GRID/2 },
    { w: GRID, h: 14, d: 1,  x: 0,       y: 7, z:  GRID/2 },
    { w: 1,    h: 14, d: GRID, x: -GRID/2, y: 7, z: 0 },
    { w: 1,    h: 14, d: GRID, x:  GRID/2, y: 7, z: 0 },
  ];
  wallConfigs.forEach(c => {
    const geo  = new THREE.BoxGeometry(c.w, c.h, c.d);
    const mesh = new THREE.Mesh(geo, wallMat);
    mesh.position.set(c.x, c.y, c.z);
    mesh.castShadow = true; mesh.receiveShadow = true;
    scene.add(mesh);
    collidables.push(mesh);
  });

  // Interior cover structures - medium gray
  const structures = [
    { w: 12, h: 2, d: 12, x: 0,   y: 1,   z: 0   },
    { w: 3,  h: 8, d: 3,  x: -20, y: 4,   z: -20 },
    { w: 3,  h: 8, d: 3,  x:  20, y: 4,   z: -20 },
    { w: 3,  h: 8, d: 3,  x: -20, y: 4,   z:  20 },
    { w: 3,  h: 8, d: 3,  x:  20, y: 4,   z:  20 },
    { w: 8,  h: 3, d: 2,  x: -30, y: 1.5, z: 0   },
    { w: 8,  h: 3, d: 2,  x:  30, y: 1.5, z: 0   },
    { w: 2,  h: 3, d: 8,  x: 0,   y: 1.5, z: -30 },
    { w: 2,  h: 3, d: 8,  x: 0,   y: 1.5, z:  30 },
    { w: 4,  h: 2, d: 4,  x: -12, y: 1,   z: -12 },
    { w: 4,  h: 2, d: 4,  x:  12, y: 1,   z: -12 },
    { w: 4,  h: 2, d: 4,  x: -12, y: 1,   z:  12 },
    { w: 4,  h: 2, d: 4,  x:  12, y: 1,   z:  12 },
    { w: 10, h: 1, d: 10, x: -35, y: 4,   z: -35 },
    { w: 10, h: 1, d: 10, x:  35, y: 4,   z: -35 },
    { w: 10, h: 1, d: 10, x: -35, y: 4,   z:  35 },
    { w: 10, h: 1, d: 10, x:  35, y: 4,   z:  35 },
    { w: 1,  h: 8, d: 20, x: -15, y: 4,   z: 0   },
    { w: 1,  h: 8, d: 20, x:  15, y: 4,   z: 0   },
  ];

  const structMat = new THREE.MeshStandardMaterial({ color: 0xb8b8c0, roughness: 0.85, metalness: 0.05 });
  structures.forEach(s => {
    const geo  = new THREE.BoxGeometry(s.w, s.h, s.d);
    const mesh = new THREE.Mesh(geo, structMat);
    mesh.position.set(s.x, s.y, s.z);
    mesh.castShadow = true; mesh.receiveShadow = true;
    scene.add(mesh);
    collidables.push(mesh);
  });

  // ===== STATIONARY TARGETS on the walls =====
  buildTargets();
}

// ===== TARGETS (Minecraft-style target on walls) =====
const targets = [];
function buildTargets() {
  // Place 10 targets along the walls and structures
  const targetPositions = [
    { x: -1, y: 1.5, z: -55, ry: 0       },   // North wall center
    { x: -20, y: 1.5, z: -54, ry: 0      },   // North wall left
    { x: 20,  y: 1.5, z: -54, ry: 0      },   // North wall right
    { x: -55, y: 1.5, z: -10, ry: Math.PI/2 }, // West wall
    { x: -55, y: 1.5, z:  10, ry: Math.PI/2 }, // West wall
    { x:  54, y: 1.5, z: -10, ry: -Math.PI/2},  // East wall
    { x:  54, y: 1.5, z:  10, ry: -Math.PI/2},  // East wall
    { x: -1,  y: 1.5, z:  54, ry: Math.PI },   // South wall
    { x: -20, y: 1.5, z:  54, ry: Math.PI },   // South wall
    { x:  20, y: 1.5, z:  54, ry: Math.PI },   // South wall right
  ];

  targetPositions.forEach(tp => {
    const group = new THREE.Group();

    // Outer ring - white
    const outerGeo = new THREE.BoxGeometry(1.4, 1.4, 0.12);
    const outerMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const outerMesh = new THREE.Mesh(outerGeo, outerMat);
    group.add(outerMesh);

    // Red ring
    const redGeo = new THREE.BoxGeometry(1.1, 1.1, 0.13);
    const redMat = new THREE.MeshStandardMaterial({ color: 0xff2222 });
    const redMesh = new THREE.Mesh(redGeo, redMat);
    group.add(redMesh);

    // White middle
    const midGeo = new THREE.BoxGeometry(0.75, 0.75, 0.14);
    const midMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const midMesh = new THREE.Mesh(midGeo, midMat);
    group.add(midMesh);

    // Red bull center
    const bullGeo = new THREE.BoxGeometry(0.4, 0.4, 0.15);
    const bullMat = new THREE.MeshStandardMaterial({ color: 0xff2222 });
    const bullMesh = new THREE.Mesh(bullGeo, bullMat);
    group.add(bullMesh);

    // Invisible hitbox for raycasting
    const hbGeo = new THREE.BoxGeometry(1.4, 1.4, 0.2);
    const hbMat = new THREE.MeshBasicMaterial({ visible: false });
    const hitbox = new THREE.Mesh(hbGeo, hbMat);
    group.add(hitbox);

    group.position.set(tp.x, tp.y, tp.z);
    group.rotation.y = tp.ry;
    scene.add(group);

    targets.push({ group, hitbox, pos: new THREE.Vector3(tp.x, tp.y, tp.z) });
  });
}

let weaponMesh = null;
function buildWeaponMesh(wep) {
  if (weaponMesh) weaponGroup.remove(weaponMesh);
  weaponMesh = new THREE.Group();

  if (wep.cat === 'melee') {
    const blade = new THREE.Mesh(
      new THREE.BoxGeometry(0.03, 0.02, 0.28),
      new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.9, roughness: 0.1 })
    );
    const handle = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.04, 0.14),
      new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.2, roughness: 0.8 })
    );
    handle.position.z = 0.21;
    weaponMesh.add(blade, handle);
  } else if (wep.cat === 'sniper') {
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.07, 0.7),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.7, roughness: 0.3 })
    );
    const barrel = new THREE.Mesh(
      new THREE.CylinderGeometry(0.015, 0.015, 0.6, 8),
      new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 })
    );
    barrel.rotation.x = Math.PI / 2;
    barrel.position.z = -0.35; barrel.position.y = 0.02;
    const scope = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 0.18, 8),
      new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 })
    );
    scope.rotation.x = Math.PI / 2;
    scope.position.z = -0.1; scope.position.y = 0.055;
    const mag = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.1, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    mag.position.y = -0.085; mag.position.z = 0.05;

    );
    barrel.rotation.x = Math.PI / 2;
    barrel.position.z = -0.3; barrel.position.y = 0.012;
    const mag = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.12, 0.04),
      new THREE.MeshStandardMaterial({ color: 0x0f0f0f })
    );
    mag.position.y = -0.1; mag.position.z = 0;
    weaponMesh.add(body, barrel, mag);
  } else {
    // Rifle
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.08, 0.6),
      new THREE.MeshStandardMaterial({ color: 0x151515, metalness: 0.6, roughness: 0.4 })
    );
    const barrel = new THREE.Mesh(
      new THREE.CylinderGeometry(0.013, 0.013, 0.3, 8),
      new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 })
    );

    barrel.position.z = -0.4; barrel.position.y = 0.015;

    weaponMesh.add(body, barrel, stock, mag);
  }

  weaponGroup.add(weaponMesh);
  return weaponMesh;
}

    `;

function selectWeapon(key, cat) {

  } else if (cat !== 'melee') {

let switchAnim = 0;

  if (slot === 'primary')   player.currentWeapon = player.primaryWeapon;

// ===== SHOOTING =====
let recoilX = 0, recoilY = 0, recoilRecovery = 0;
const hitParticles = [];

function shoot() {
  const wep = player.currentWeapon;
  const now = performance.now() / 1000;
  const interval = 60 / wep.rpm;
  if (now - player.lastShot < interval) return;
  if (player.reloading) return;

  const ammoData = player.ammo[getWeaponKey()];
  if (ammoData.mag <= 0) { startReload(); return; }

  player.lastShot = now;
  ammoData.mag--;

  recoilY -= wep.recoil * (0.8 + Math.random() * 0.4);
  recoilX += (Math.random() - 0.5) * wep.recoil * 0.5;
  recoilRecovery = 0.12;

  const mf = document.getElementById('muzzle-flash');
  mf.classList.add('flash');
  setTimeout(() => mf.classList.remove('flash'), 40);

  for (let p = 0; p < wep.pellets; p++) {
    fireRay(wep, p);
  }

  if (weaponMesh) {
    weaponMesh.position.z = 0.08;
    weaponMesh.rotation.x = -wep.recoil * 2;
  }
  updateHUD();
}

let screenShakeAmt = 0, screenShakeTimer = 0;
function screenShake(amt) { screenShakeAmt = Math.max(screenShakeAmt, amt); screenShakeTimer = 0.15; }

function getWeaponKey() {
  return Object.keys(WEAPONS).find(k => WEAPONS[k] === player.currentWeapon) || 'glock';
}

function fireRay(wep, pelletIndex) {
  const spread = player.ads ? wep.spread * 0.3 : wep.spread;
  const sx = (Math.random() - 0.5) * spread * 0.01;
  const sy = (Math.random() - 0.5) * spread * 0.01;

  const dir = new THREE.Vector3(sx, sy, -1);
  dir.applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
  dir.normalize();

  const origin = new THREE.Vector3();
  camera.getWorldPosition(origin);

  const raycaster = new THREE.Raycaster(origin, dir, 0.1, wep.range);

  // Check targets first
  let hit = false;
  for (let i = 0; i < targets.length; i++) {
    const t = targets[i];
    const intersects = raycaster.intersectObject(t.hitbox, false);
    if (intersects.length > 0) {
      spawnHitParticle(intersects[0].point, false);
      spawnBulletDecal(intersects[0].point, intersects[0].face ? intersects[0].face.normal : dir.clone().negate());
      showHitmarker(false);
      addKillFeed('HIT TARGET');
      hit = true;
      break;
    }
  }

  if (!hit) {
    // Check world geometry for bullet decals
    const worldHits = raycaster.intersectObjects(collidables, false);
    if (worldHits.length > 0) {
      spawnBulletDecal(worldHits[0].point, worldHits[0].face ? worldHits[0].face.normal : dir.clone().negate());
    }
  }
}

// ===== BULLET DECALS (persistent marks) =====
function spawnBulletDecal(pos, normal) {
  const geo = new THREE.CircleGeometry(0.06, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.85, depthWrite: false });
  const mesh = new THREE.Mesh(geo, mat);

  // Orient to surface normal
  const n = normal.clone().normalize();
  mesh.position.copy(pos).addScaledVector(n, 0.02);
  const up = Math.abs(n.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
  const tangent = up.clone().cross(n).normalize();
  const bitangent = n.clone().cross(tangent);
  const m = new THREE.Matrix4().makeBasis(tangent, bitangent, n);
  mesh.setRotationFromMatrix(m);

  scene.add(mesh);
  bulletDecals.push(mesh);

  // Keep decal count manageable
  if (bulletDecals.length > 300) {
    const old = bulletDecals.shift();
    scene.remove(old);
  }
}

function spawnHitParticle(pos, isHead) {
  const count = isHead ? 10 : 5;
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.03, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: isHead ? 0xff8800 : 0xff4444 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      Math.random() * 3,
      (Math.random() - 0.5) * 4
    );
    hitParticles.push({ mesh, vel, life: 0.25 });
  }
}

let hitmarkerTimer = 0;

function startReload() {

  const ammoData = player.ammo[key];

// ===== SCOPE =====
let scopeCanvas, scopeCtx;
function initScopeOverlay() {
  scopeCanvas = document.getElementById('scope-canvas');
  scopeCanvas.width = window.innerWidth;
  scopeCanvas.height = window.innerHeight;
  scopeCtx = scopeCanvas.getContext('2d');
}
initScopeOverlay();

function drawScope() {
  const ctx = scopeCtx;
  const w = scopeCanvas.width, h = scopeCanvas.height;
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.35;
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, w, h);
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  ctx.clearRect(0, 0, w, h);
  ctx.restore();
  ctx.strokeStyle = 'rgba(0,0,0,1)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.9)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - r, cy); ctx.lineTo(cx - r * 0.1, cy);
  ctx.moveTo(cx + r * 0.1, cy); ctx.lineTo(cx + r, cy);
  ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy - r * 0.1);
  ctx.moveTo(cx, cy + r * 0.1); ctx.lineTo(cx, cy + r);
  ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  [-0.4, -0.2, 0.2, 0.4].forEach(x => {
    ctx.beginPath(); ctx.arc(cx + x * r, cy, 3, 0, Math.PI * 2); ctx.fill();
  });
}

// ===== PHYSICS =====
const GRAVITY      = -22;
const SPEED        = 14;
const SPRINT_SPEED = 20;
const JUMP_FORCE   = 7;   // reduced from 10 to avoid overly tall jumps

function updatePhysics(dt) {
  if (player.dead) return;

  const wep = player.currentWeapon;
  const isSprinting = keys['ShiftLeft'] && player.onGround;
  const moveSpeed = (isSprinting ? SPRINT_SPEED : SPEED) * wep.speedMult;

  // Movement direction relative to yaw
  const moveDir = new THREE.Vector3();
  const yawQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

  if (keys['KeyW']) moveDir.z -= 1;
  if (keys['KeyS']) moveDir.z += 1;
  if (keys['KeyA']) moveDir.x -= 1;
  if (keys['KeyD']) moveDir.x += 1;

  if (moveDir.length() > 0) {
    moveDir.normalize();
    moveDir.applyQuaternion(yawQuat);
  }

  if (player.onGround) {
    const targetX = moveDir.x * moveSpeed;
    const targetZ = moveDir.z * moveSpeed;
    player.vel.x += (targetX - player.vel.x) * Math.min(1, dt * 22);
    player.vel.z += (targetZ - player.vel.z) * Math.min(1, dt * 22);
  } else {
    // Air strafing
    const targetX = moveDir.x * moveSpeed * 0.8;
    const targetZ = moveDir.z * moveSpeed * 0.8;
    player.vel.x += (targetX - player.vel.x) * dt * 6;
    player.vel.z += (targetZ - player.vel.z) * dt * 6;
  }

  // Jump - only triggers on fresh press, not held
  if (keys['Space'] && player.onGround) {
    player.vel.y = JUMP_FORCE;
    player.onGround = false;
    keys['Space'] = false; // consume to avoid bunny hop
  }

  // Gravity
  player.vel.y += GRAVITY * dt;

  // Move
  const newPos = player.pos.clone();
  newPos.x += player.vel.x * dt;
  newPos.y += player.vel.y * dt;
  newPos.z += player.vel.z * dt;

  // Ground check
  const standHeight = player.crouching ? player.crouchHeight : player.height;
  if (newPos.y - standHeight < 0) {
    newPos.y = standHeight;
    player.vel.y = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  // Boundary
  const BOUND = 57;
  newPos.x = Math.max(-BOUND, Math.min(BOUND, newPos.x));
  newPos.z = Math.max(-BOUND, Math.min(BOUND, newPos.z));

  // Structure collision (AABB)
  for (const obj of collidables) {
    const box = new THREE.Box3().setFromObject(obj);
    const pBox = new THREE.Box3(
      new THREE.Vector3(newPos.x - 0.4, newPos.y - standHeight, newPos.z - 0.4),
      new THREE.Vector3(newPos.x + 0.4, newPos.y + 0.1, newPos.z + 0.4)
    );
    if (box.intersectsBox(pBox)) {
      const prev = player.pos.clone();
      const testX = prev.clone(); testX.x = newPos.x;
      const testZ = prev.clone(); testZ.z = newPos.z;
      const testXBox = new THREE.Box3(
        new THREE.Vector3(testX.x - 0.4, testX.y - standHeight, testX.z - 0.4),
        new THREE.Vector3(testX.x + 0.4, testX.y + 0.1, testX.z + 0.4)
      );
      const testZBox = new THREE.Box3(
        new THREE.Vector3(testZ.x - 0.4, testZ.y - standHeight, testZ.z - 0.4),
        new THREE.Vector3(testZ.x + 0.4, testZ.y + 0.1, testZ.z + 0.4)
      );
      if (box.intersectsBox(testXBox)) { newPos.x = prev.x; player.vel.x = 0; }
      if (box.intersectsBox(testZBox)) { newPos.z = prev.z; player.vel.z = 0; }
      // Stand on top
      const topTest = new THREE.Box3(
        new THREE.Vector3(newPos.x - 0.35, box.max.y, newPos.z - 0.35),
        new THREE.Vector3(newPos.x + 0.35, box.max.y + 0.1, newPos.z + 0.35)
      );
      if (!box.intersectsBox(topTest) && player.vel.y <= 0) {
        newPos.y = box.max.y + standHeight;
        player.vel.y = 0;
        player.onGround = true;
      }
    }
  }

  player.pos.copy(newPos);
  player.crouching = keys['ControlLeft'] || keys['ControlRight'];

  cameraHolder.position.copy(player.pos);
  if (player.crouching) cameraHolder.position.y -= 0.3;
  cameraHolder.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  // Speed bar
  const hspd = Math.sqrt(player.vel.x ** 2 + player.vel.z ** 2);
  document.getElementById('speed-fill').style.width = Math.min(100, hspd / SPRINT_SPEED * 100) + '%';
}

// ===== MOUSE LOOK =====
const SENS = 0.002;
function updateLook(dt) {
  player.yaw   -= mouse.dx * SENS;
  player.pitch -= mouse.dy * SENS;
  player.pitch  = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, player.pitch));
  mouse.dx = 0;
  mouse.dy = 0;

  const isSniper = player.currentWeapon.cat === 'sniper';
  if (mouse.buttons[2] && !buyMenuOpen) {
    player.ads = true;
    camera.fov = isSniper ? 15 : 55;
    weaponGroup.position.set(0, -0.3, -0.5);
    if (isSniper) {
      document.getElementById('scope-overlay').classList.add('active');
      drawScope();
    }
  } else {
    player.ads = false;
    camera.fov = 90;
    weaponGroup.position.set(0.3, -0.3, -0.5);
    document.getElementById('scope-overlay').classList.remove('active');
  }
  camera.updateProjectionMatrix();
}

// ===== WEAPON ANIMATION =====
let bobTime = 0;
function updateWeaponAnim(dt) {
  if (!weaponMesh) return;
  const hspd = Math.sqrt(player.vel.x ** 2 + player.vel.z ** 2);
  const bobAmt = player.onGround ? Math.min(hspd / 20, 0.6) : 0;
  bobTime += dt * hspd * 0.5;

  const targetY = Math.sin(bobTime * 2.5) * 0.012 * bobAmt;
  const targetX = Math.sin(bobTime * 1.25) * 0.008 * bobAmt;
  weaponMesh.position.y += (targetY - weaponMesh.position.y) * dt * 15;
  weaponMesh.position.x += (targetX - weaponMesh.position.x) * dt * 15;
  weaponMesh.position.z += (0 - weaponMesh.position.z) * dt * 18;
  weaponMesh.rotation.x += (0 - weaponMesh.rotation.x) * dt * 18;

  if (switchAnim > 0) {
    switchAnim -= dt;
    weaponGroup.position.y = -0.3 - switchAnim * 0.6;
  } else {
    weaponGroup.position.y += (-0.3 - weaponGroup.position.y) * dt * 12;
  }

  if (player.reloading) {
    weaponGroup.position.y += (-0.5 - weaponGroup.position.y) * dt * 8;
  }

  if (recoilRecovery > 0) {
    const recoverSpeed = dt * 6;
    recoilY += recoverSpeed * 0.5;
    recoilX *= (1 - dt * 8);
    recoilRecovery -= dt;
    if (recoilRecovery <= 0) recoilRecovery = 0;
  }
  player.pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, player.pitch + recoilY * 0.01));
  player.yaw += recoilX * 0.01;
  recoilY *= (1 - dt * 12);
  recoilX *= (1 - dt * 12);
}

// ===== RELOAD UPDATE =====
function updateReload(dt) {
  if (!player.reloading) return;
  player.reloadTimer -= dt;
  if (player.reloadTimer <= 0) {
    player.reloading = false;
    const key = getWeaponKey();
    const ammoData = player.ammo[key];
    const wep = player.currentWeapon;
    const needed = wep.mag - ammoData.mag;
    const take = Math.min(needed, ammoData.reserve);
    ammoData.mag += take;
    ammoData.reserve -= take;
    if (weaponMesh) weaponMesh.position.y = 0;
    updateHUD();
  }
}

// ===== PARTICLES UPDATE =====
function updateParticles(dt) {
  for (let i = hitParticles.length - 1; i >= 0; i--) {
    const p = hitParticles[i];
    p.life -= dt;
    p.vel.y -= 20 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = p.life / 0.25;
    p.mesh.material.transparent = true;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      hitParticles.splice(i, 1);
    }
  }
}

// ===== TIMERS UPDATE =====
function updateTimers(dt) {
  if (hitmarkerTimer > 0) {
    hitmarkerTimer -= dt;
    if (hitmarkerTimer <= 0) document.getElementById('hitmarker').classList.remove('flash');
  }
}

// ===== SHOOTING INPUT =====
function updateShooting(dt) {
  if (!mouse.locked || buyMenuOpen || player.reloading) return;
  const wep = player.currentWeapon;
  if (wep.cat === 'melee') return;
  if (wep.auto) {
    if (mouse.buttons[0]) shoot();
  } else {
    if (mouse.buttons[0]) {
      const now = performance.now() / 1000;
      if (now - player.lastShot > 60 / wep.rpm * 0.8) shoot();
    }
  }
}

// ===== MAIN LOOP =====
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (!buyMenuOpen) {
    updateLook(dt);
    updatePhysics(dt);
    updateShooting(dt);
  }
  updateReload(dt);
  updateWeaponAnim(dt);
  updateParticles(dt);
  updateTimers(dt);

  renderer.render(scene, camera);
}

animate();

// ===== RESIZE =====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (scopeCanvas) {
    scopeCanvas.width  = window.innerWidth;
    scopeCanvas.height = window.innerHeight;
  }
});
</script>
</body>
